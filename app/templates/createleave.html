{% extends "base.html" %}
{% block title %}Create Leave{% endblock %}
{% block header_title %}Create Leave Application{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <form action="{{ url_for('student.create_leave') }}" method="post" class="space-y-6">

        <div>
            <label for="reason" class="block text-sm font-medium text-gray-900 mb-2">Reason for Leave</label>
            <textarea id="reason" name="reason" rows="4" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg resize-none
                       focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"></textarea>
        </div>

        <div>
            <label for="address" class="block text-sm font-medium text-gray-900 mb-2">Address During Leave</label>
            <textarea id="address" name="address" rows="3" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg resize-none
                       focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"></textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label for="student_phone" class="block text-sm font-medium text-gray-900 mb-2">Your Phone</label>
                <input type="tel" id="student_phone" name="student_phone" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="parent_phone" class="block text-sm font-medium text-gray-900 mb-2">Parent Phone</label>
                <input type="tel" id="parent_phone" name="parent_phone" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="start_date" class="block text-sm font-medium text-gray-900 mb-2">Start Date</label>
                <input type="date" id="start_date" name="start_date" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="end_date" class="block text-sm font-medium text-gray-900 mb-2">End Date</label>
                <input type="date" id="end_date" name="end_date" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="out_time" class="block text-sm font-medium text-gray-900 mb-2">Out Time</label>
                <input type="time" id="out_time" name="out_time" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="in_time" class="block text-sm font-medium text-gray-900 mb-2">In Time</label>
                <input type="time" id="in_time" name="in_time" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="total_days" class="block text-sm font-medium text-gray-900 mb-2">Total Days</label>
                <input type="number" id="total_days" name="total_days" min="1" required class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
            <div>
                <label for="working_days" class="block text-sm font-medium text-gray-900 mb-2">Working Days</label>
                <input type="number" id="working_days" name="working_days" min="0" class="block w-full px-4 py-3 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent">
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 pt-2">
            <button type="submit"
                class="flex-1 py-3 text-white bg-[#1a1a1a] hover:bg-gray-800 rounded-lg transition font-medium">
                Submit Leave
            </button>
            <a href="{{ url_for('student.dashboard') }}" class="flex-1 py-3 text-center text-gray-700 bg-white border border-gray-300 hover:bg-gray-50
                       rounded-lg transition font-medium">
                Back to Dashboard
            </a>
        </div>
    </form>
</div>
{% endblock %}
