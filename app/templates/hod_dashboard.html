{% extends "base.html" %}
{% block title %}HOD Dashboard{% endblock %}
{% block header_title %}Head of Department Dashboard{% endblock %}

{% block content %}
<p class="text-gray-600 text-lg mb-8">Welcome, {{ name }}!</p>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-w-lg">
    <a href="{{ url_for('admin.hod_pending_leaves') }}"
        class="block px-6 py-8 text-center bg-white border-2 border-gray-300 hover:border-gray-900 rounded-lg transition group">
        <div class="text-4xl mb-3">⏳</div>
        <div class="text-lg font-semibold text-gray-900">Pending Leaves</div>
        <div class="text-sm text-gray-500 mt-1">Review pending requests</div>
    </a>

    <a href="{{ url_for('auth.logout') }}"
        class="block px-6 py-8 text-center bg-white border-2 border-gray-300 hover:border-red-400 rounded-lg transition group">
        <div class="text-4xl mb-3">🚪</div>
        <div class="text-lg font-semibold text-gray-900 group-hover:text-red-600">Logout</div>
        <div class="text-sm text-gray-500 mt-1">Sign out of account</div>
    </a>
</div>
{% endblock %}
